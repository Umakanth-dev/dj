<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#219150;
}

#message{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:green;
}
</style>

</head>
<body>

<header>
    <h1>Luxury Hotel Booking</h1>
</header>

<div class="container">
    <h2>Book Your Room</h2>

    <form id="bookingForm">
        <div class="form-group">
            <label>Guest Name</label>
            <input type="text" id="guestName" required>
        </div>

        <div class="form-group">
            <label>Check-In Date</label>
            <input type="date" id="checkin" required>
        </div>

        <div class="form-group">
            <label>Check-Out Date</label>
            <input type="date" id="checkout" required>
        </div>

        <div class="form-group">
            <label>Number of Guests</label>
            <select id="guests">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
            </select>
        </div>

        <button type="submit">Book Now</button>
    </form>

    <div id="message"></div>
</div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("guestName").value;
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;

    document.getElementById("message").innerHTML =
        `Booking confirmed for ${name}<br>
         Check-In: ${checkin}<br>
         Check-Out: ${checkout}`;
});
</script>
</body>
</html>
